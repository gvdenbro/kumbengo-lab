title: Üsküdar
tuning: silaba
tags: [turkish, traditional]

arrangements:
  - name: Open
    steps:
      # Reusable phrases
      - &open  # a bes a g f e f g
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R6}
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R5}
        - {d: 0.5, string: L8}
        - {d: 0.5, string: R4}
        - {d: 0.5, string: L8}
        - {d: 0.5, string: R5}
  - name: Descend
    steps:
      # Reusable phrases
      - &descend  # a bes a g f e d(half)
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R6}
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R5}
        - {d: 0.5, string: L8}
        - {d: 0.5, string: R4}
        - {d: 1, string: L7}
  - name: Turn
    steps:
      # Reusable phrases
      - &turn  # e g f e e d c d
        - {d: 0.5, string: R4}
        - {d: 0.5, string: R5}
        - {d: 0.5, string: L8}
        - {d: 0.5, string: R4}
        - {d: 0.5, string: R4}
        - {d: 0.5, string: L7}
        - {d: 0.5, string: R3}
        - {d: 0.5, string: L7}
  - name: B Head
    steps:
      # Reusable phrases
      - &b_head  # d. a a a bes a bes c a(whole)
        - {d: 1.5, string: L7}
        - {d: 0.5, string: L9}
        - {d: 1, string: L9}
        - {d: 1, string: L9}
        - {d: 0.5, string: R6}
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R6}
        - {d: 0.5, string: R3}
        - {d: 2, string: L9}
  - name: B Tail
    steps:
      # Reusable phrases
      - &b_tail  # g. a f g a bes a g f e d
        - {d: 1.5, string: R5}
        - {d: 0.5, string: L9}
        - {d: 1, string: L8}
        - {d: 1, string: R5}
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R6}
        - {d: 0.5, string: L9}
        - {d: 0.5, string: R5}
        - {d: 0.5, string: L8}
        - {d: 0.5, string: R4}
        - {d: 1, string: L7}
  - name: C Head
    steps:
      # Reusable phrases
      - &c_head  # d,. e f g a bes a g f e d (low octave)
        - {d: 1.5, string: L3}
        - {d: 0.5, string: L4}
        - {d: 1, string: R1}
        - {d: 1, string: L5}
        - {d: 0.5, string: R2}
        - {d: 0.5, string: L6}
        - {d: 0.5, string: R2}
        - {d: 0.5, string: L5}
        - {d: 0.5, string: R1}
        - {d: 0.5, string: L4}
        - {d: 1, string: L3}
  - name: Melody
    steps:
      # === A section (ending on e) ===
      - *open
      - *descend
      - *turn
      - {d: 4, string: R4}
      # === A section (ending on d) ===
      - *open
      - *descend
      - *turn
      - {d: 4, string: L7}
      # === B section ===
      - *b_head
      - *b_tail
      # === B section repeat (ending on a) ===
      - *b_head
      - {d: 1.5, string: R5}
      - {d: 0.5, string: L9}
      - {d: 1, string: L8}
      - {d: 1, string: R5}
      - {d: 4, string: L9}
      # === C section (ending on e) ===
      - *c_head
      - *turn
      - {d: 4, string: R4}
      # === C section (ending on d) ===
      - *c_head
      - *turn
      - {d: 4, string: L7}